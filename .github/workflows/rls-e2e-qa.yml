name: RLS E2E QA Suite

# Runs the full database-level RLS / multi-tenant E2E suite (tests/rls/run.ts)
# against the live Supabase project on every push and PR. Posts a PASS/FAIL
# summary to the run page and uploads the full log as an artifact.
#
# Required repository secrets:
#   SUPABASE_URL                  e.g. https://xxx.supabase.co
#   SUPABASE_PUBLISHABLE_KEY      anon/publishable key
#   SUPABASE_SERVICE_ROLE_KEY     service role key  (preferred — fast path)
#   QA_TEST_SECRET                fallback: shared secret for qa-test-admin fn
#   QA_USER_PASSWORD              optional, default "QaPass!2026"

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: rls-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rls-e2e:
    name: RLS / Multi-tenant E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      QA_TEST_SECRET: ${{ secrets.QA_TEST_SECRET }}
      QA_USER_PASSWORD: ${{ secrets.QA_USER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify required secrets
        run: |
          missing=0
          for v in SUPABASE_URL SUPABASE_PUBLISHABLE_KEY; do
            if [ -z "${!v}" ]; then echo "::error::Missing required secret: $v"; missing=1; fi
          done
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && [ -z "$QA_TEST_SECRET" ]; then
            echo "::error::Need either SUPABASE_SERVICE_ROLE_KEY or QA_TEST_SECRET"
            missing=1
          fi
          [ "$missing" = "0" ]

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run E2E QA suite
        id: e2e
        run: |
          set -o pipefail
          mkdir -p reports
          bun run tests/rls/run.ts 2>&1 | tee reports/rls-e2e.log

      - name: Build PASS/FAIL summary
        if: always()
        run: |
          {
            echo "# RLS / Multi-tenant E2E Report"
            echo ""
            if [ "${{ steps.e2e.outcome }}" = "success" ]; then
              echo "**Status:** ✅ PASS"
            else
              echo "**Status:** ❌ FAIL"
            fi
            echo ""
            echo "## Results"
            echo '```'
            # Strip ANSI colour codes from the saved log for the summary.
            sed -r 's/\x1b\[[0-9;]*m//g' reports/rls-e2e.log \
              | awk '/^▶|PASS|FAIL|REPORT|Total:|Failing|^  ✗|^      /'
            echo '```'
            echo ""
            echo "Full log is attached as the **rls-e2e-log** artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload full log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rls-e2e-log
          path: reports/rls-e2e.log
          retention-days: 14